name: WIF Test
on: [push]

permissions:
  id-token: write   # REQUIRED: lets the workflow request an OIDC token
  contents: read

jobs:
  test-wif:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/876585655223/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "wif-lab-sa@dragos-lab-main-1.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Prove it works
        run: gsutil ls gs://dragos-wif-lab-bucket-1/
